name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @shying packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Build, validate, and publish packages
        run: npm run publish:packages
        env:
          # Bootstrap with a short-lived granular token that has @shying
          # write access and bypass-2FA enabled. Delete this secret after
          # both packages have npm Trusted Publishers configured; npm will
          # then use this workflow's OIDC identity.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
